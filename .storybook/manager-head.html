<!--
  Manager Head — Immersive Storybook Theming

  Single source of truth at runtime: --sb-* CSS custom properties on <body>,
  written by manager.tsx on every globalsUpdated event. Storybook's emotion
  theme is set ONCE at startup (also in manager.tsx, with themes.light or
  themes.dark spread as the base) so chrome surfaces we don't override here
  inherit sensible defaults instead of being fought.

  Fonts are loaded here because the manager frame is separate from preview.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600;700&family=Source+Sans+3:wght@400;600;700&family=Hind:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&family=Playfair+Display:wght@400;600;700&family=Newsreader:wght@400;600;700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  /* ============================================
     SIDEBAR — Background, text, font
     ============================================ */
  /* Sidebar container (Storybook uses emotion CSS with hashed classes) */
  [class*="sidebar"] {
    background-color: var(--sb-app-bg, white) !important;
    color: var(--sb-text-color, #333) !important;
    font-family: var(--sb-font-base, sans-serif) !important;
  }

  /* Sidebar nav tree items */
  [class*="sidebar"] button,
  [class*="sidebar"] a {
    color: var(--sb-text-color, #333) !important;
    font-family: var(--sb-font-base, sans-serif) !important;
  }

  [class*="sidebar"] button:hover,
  [class*="sidebar"] a:hover {
    color: var(--sb-bar-selected, #4665f5) !important;
    background-color: color-mix(in srgb, var(--sb-text-color, #333) 5%, transparent) !important;
  }

  /* Sidebar search input */
  [class*="sidebar"] input[type="text"],
  [class*="sidebar"] input[type="search"] {
    background-color: var(--sb-input-bg, white) !important;
    color: var(--sb-input-text, #333) !important;
    border-color: var(--sb-input-border, #bdbdbd) !important;
    font-family: var(--sb-font-base, sans-serif) !important;
  }

  [class*="sidebar"] input::placeholder {
    color: var(--sb-text-muted, #828282) !important;
  }

  /* Sidebar group headings — scope to the GroupHeading class only.
     [class*="heading"] alone is too broad and matched unrelated elements. */
  [class*="sidebar"] [class*="GroupHeading"] {
    color: var(--sb-text-muted, #828282) !important;
    font-family: var(--sb-font-base, sans-serif) !important;
  }

  /* Active/selected sidebar item — text and icon */
  [class*="sidebar"] [data-selected="true"],
  [class*="sidebar"] [aria-current="true"],
  [class*="sidebar"] [data-selected="true"] svg,
  [class*="sidebar"] [aria-current="true"] svg {
    color: var(--sb-bar-selected, #4665f5) !important;
  }

  /* ============================================
     TOOLBAR — Top bar with controls
     ============================================ */
  .sb-bar {
    background-color: var(--sb-bar-bg, white) !important;
    border-color: var(--sb-border-color, #e0e0e0) !important;
    font-family: var(--sb-font-base, sans-serif) !important;
  }

  .sb-bar button,
  .sb-bar a {
    color: var(--sb-bar-text, #828282) !important;
  }

  .sb-bar button:hover,
  .sb-bar a:hover {
    color: var(--sb-bar-hover, #4665f5) !important;
  }

  .sb-bar button[class*="active"],
  .sb-bar button[aria-pressed="true"] {
    color: var(--sb-bar-selected, #4665f5) !important;
  }

  /* Toolbar separator */
  .sb-bar [class*="separator"] {
    border-color: var(--sb-border-color, #e0e0e0) !important;
  }

  /* ============================================
     ADDON PANELS — Bottom panel area
     ============================================ */
  [class*="tabbutton"] {
    color: var(--sb-bar-text, #828282) !important;
    font-family: var(--sb-font-base, sans-serif) !important;
  }

  [class*="tabbutton"]:hover {
    color: var(--sb-bar-hover, #4665f5) !important;
  }

  [class*="tabbutton"][class*="selected"],
  [class*="tabbutton"][aria-selected="true"] {
    color: var(--sb-bar-selected, #4665f5) !important;
  }

  /* Panel content area */
  [class*="panelInner"],
  [class*="ActionBar"] {
    background-color: var(--sb-content-bg, white) !important;
    color: var(--sb-text-color, #333) !important;
  }

  /* ============================================
     DARK THEME — color-scheme + scrollbar
     Borders are already on the --sb-border-color var, so the duplicate
     border override is gone. Native form controls (focus rings, scrollbar
     defaults) need color-scheme to render correctly in dark.
     ============================================ */
  body[data-bds-dark="true"] {
    color-scheme: dark;
  }

  body[data-bds-dark="true"] ::-webkit-scrollbar-track {
    background: var(--sb-app-bg, black);
  }

  body[data-bds-dark="true"] ::-webkit-scrollbar-thumb {
    background: var(--sb-text-muted, #555);
    border-radius: 4px;
  }

  /* ============================================
     SIDEBAR — Focus/hover outlines
     Storybook uses colorSecondary for focus rings
     and hover box-shadows on sidebar items. Override
     to remove the colored drop-shadow effect.
     ============================================ */
  [class*="sidebar"] button:focus-visible,
  [class*="sidebar"] a:focus-visible {
    outline: 2px solid var(--sb-bar-selected, #4665f5) !important;
    outline-offset: -2px !important;
    box-shadow: none !important;
  }

  [class*="sidebar"] button:focus:not(:focus-visible),
  [class*="sidebar"] a:focus:not(:focus-visible) {
    outline: none !important;
    box-shadow: none !important;
  }

  [class*="sidebar"] button,
  [class*="sidebar"] a,
  [class*="sidebar"] [class*="IconButton"],
  [class*="sidebar"] [data-action],
  [class*="sidebar"] [role="treeitem"] {
    box-shadow: none !important;
    outline: none !important;
  }

  [class*="sidebar"] button:hover,
  [class*="sidebar"] a:hover,
  [class*="sidebar"] [class*="IconButton"]:hover {
    box-shadow: none !important;
    outline: none !important;
  }

  /* ============================================
     LOGO AREA — Brand image container
     ============================================ */
  [class*="sidebar"] [class*="Head"] {
    background-color: var(--sb-app-bg, white) !important;
  }
</style>
