<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-subtle: #f5f5f5;
      --border: #e0e0e0;
      --text: #111111;
      --text-muted: #888888;
      --accent: #0d99ff;
      --radius: 6px;
      --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font);
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      height: 660px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header__title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .btn-icon:hover { background: var(--bg-subtle); color: var(--text); }

    /* ── Inputs ── */
    .inputs {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field__label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .field__row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .color-preview {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: #e0e0e0;
      flex-shrink: 0;
      transition: background-color 0.15s;
    }
    input[type="text"] {
      flex: 1;
      height: 28px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 12px;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--text-muted); }

    /* ── Toolbar ── */
    .toolbar {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .toolbar__label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .btn-text {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-family: var(--font);
      font-size: 11px;
      cursor: pointer;
      color: var(--text-muted);
    }
    .btn-text:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── Swatch grid ── */
    .swatch-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .swatch-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 12px;
    }
    .swatch-row {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 38px;
      gap: 10px;
      transition: background 0.1s;
    }
    .swatch-row:hover { background: var(--bg-subtle); }
    .swatch-row--base { background: rgba(13, 153, 255, 0.04); }
    .swatch-row--base:hover { background: rgba(13, 153, 255, 0.08); }

    .swatch {
      width: 48px;
      height: 26px;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      font-size: 10px;
      font-weight: 600;
    }
    .swatch__stop { font-size: 10px; font-weight: 700; opacity: 0.85; }
    .swatch__dot { font-size: 7px; opacity: 0.7; }

    .swatch__info {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex: 1;
    }
    .swatch__hex {
      font-size: 12px;
      font-weight: 500;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text);
    }
    .swatch__rgb, .swatch__cmyk {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn-primary {
      width: 100%;
      height: 34px;
      background: var(--text);
      color: #ffffff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .status-msg {
      font-size: 11px;
      color: #27ae60;
      text-align: center;
      min-height: 14px;
    }
    .error-msg {
      font-size: 11px;
      color: #e53935;
      text-align: center;
      min-height: 14px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header__title">Color Ramp Generator</span>
    <button class="btn-icon" id="close-btn" title="Close">✕</button>
  </div>

  <!-- Inputs -->
  <div class="inputs">
    <div class="field">
      <label class="field__label">Color name</label>
      <input type="text" id="name-input" placeholder="primary, gold, neutral…" spellcheck="false">
    </div>
    <div class="field">
      <label class="field__label">Hex code</label>
      <div class="field__row">
        <div class="color-preview" id="color-preview"></div>
        <input type="text" id="hex-input" placeholder="#4665F5" spellcheck="false" maxlength="7">
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar__label">50 → 950 · 11 stops · LCH</span>
    <button class="btn-text" id="toggle-cmyk">Show CMYK</button>
  </div>

  <!-- Swatches -->
  <div class="swatch-scroll">
    <div id="swatch-grid">
      <div class="swatch-empty">Enter a hex code to generate a ramp</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-primary" id="create-btn" disabled>
      Create 11 variables → Primitives
    </button>
    <div class="status-msg" id="status-msg"></div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <script>/* __INLINE_BUNDLE__ */</script>
</body>
</html>
