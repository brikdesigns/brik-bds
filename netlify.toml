[build]
  command = "npm run build-storybook"
  publish = "storybook-static"

[build.environment]
  NODE_VERSION = "22"

# ── Staging (branch deploys) ────────────────────────────────────────
# Workflow:
#   main     → storybook.brikdesigns.com  (production)
#   staging  → staging.storybook.brikdesigns.com

[context.staging]
  command = "npm run build-storybook"

[context.deploy-preview]
  command = "npm run build-storybook"

# ── Headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
