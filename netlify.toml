[build]
  command = "npm run build-storybook"
  publish = "storybook-static"

[build.environment]
  NODE_VERSION = "22"

# ── Staging (branch deploys) ────────────────────────────────────────
# Workflow:
#   main     → storybook.brikdesigns.com  (production)
#   staging  → staging.storybook.brikdesigns.com

[context.staging]
  command = "npm run build-storybook"

[context.deploy-preview]
  command = "npm run build-storybook"

# ── Headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

# Cache policy — prevent the "Failed to fetch dynamically imported module"
# error caused by stale chunk hashes.
#
# Storybook's Vite build emits content-hashed chunks under /assets/*.js (and
# .css, etc). The hash is part of the filename, so the URL is stable for a
# given content and changes on every deploy. Those are safe to cache forever.
#
# But index.html, iframe.html, and index.json reference those hashed URLs by
# name. If a browser holds a stale HTML/JSON that points at a hash Netlify
# has already evicted, the next dynamic import 404s. Every page-load must
# revalidate these entry points so the chunk URLs it references are fresh.
#
# Bonus: the `assets/` globs also cover woff2 + images, which are hashed too.

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/iframe.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/project.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# vite-inject-mocker-entry.js (emitted by @storybook/addon-vitest) is a
# STABLE-named module entry that `import`s a content-hashed chunk
# (assets/preload-helper-*.js). It's referenced by iframe.html by its fixed
# name, so unlike the hashed chunks it isn't self-invalidating. If a browser
# serves a stale copy after a deploy, it points at a preload-helper hash that
# no longer exists → a 404 that a client-side reload cannot heal (the stale
# entry keeps resolving to the dead hash). Revalidate it on every load so a
# reload always pulls the entry that matches the current deploy's chunks.
[[headers]]
  for = "/vite-inject-mocker-entry.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sb-*/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
