[build]
  command = "npm run build-storybook"
  publish = "storybook-static"

[build.environment]
  NODE_VERSION = "22"

# ── Staging (branch deploys) ────────────────────────────────────────
# Any push to `staging` branch auto-deploys to:
#   staging--brikstorybook.netlify.app
#
# Workflow:
#   main     → brikstorybook.netlify.app  (production)
#   staging  → staging--brikstorybook.netlify.app
#   PR #N    → deploy-preview-N--brikstorybook.netlify.app

[context.staging]
  command = "npm run build-storybook"

[context.deploy-preview]
  command = "npm run build-storybook"
