name: Sync Figma Variables

on:
  push:
    paths:
      - 'design-tokens/figma-export.json'
      - 'design-tokens/tokens-studio.json'
  workflow_dispatch:
    inputs:
      skip-build:
        description: 'Skip token build (just commit the raw export)'
        required: false
        default: 'false'
        type: boolean

jobs:
  process-figma-export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Detect source
      id: detect
      run: |
        # Check which file was updated (Tokens Studio vs manual export)
        if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q 'tokens-studio.json'; then
          echo "source=tokens-studio" >> $GITHUB_OUTPUT
        else
          echo "source=manual" >> $GITHUB_OUTPUT
        fi

    - name: Build Tokens Studio → Style Dictionary
      if: steps.detect.outputs.source == 'tokens-studio' && inputs.skip-build != 'true'
      run: npm run build:sd-figma

    - name: Build all tokens
      if: inputs.skip-build != 'true'
      run: npm run build:all-tokens

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add design-tokens/ tokens/
        git add -f build/
        if git diff --cached --quiet; then
          echo "No token changes to commit — build output matches branch."
        else
          git commit -m "Sync Figma Variables — $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
        fi
