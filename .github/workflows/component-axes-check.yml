name: Component Axes Check

# Ensures manifest/component-axes.json stays in sync with component type unions.
# Fails the build if any *Variant / *Appearance / *Size / *Status export changes
# without a corresponding manifest regeneration commit.
#
# Why this is a CI gate (not just pre-push):
#   - Cloud-agent commits bypass local hooks entirely.
#   - PRs from fresh clones may not have husky installed.
#   - TypeScript guards per-call-site values; this guards the canon manifest.
#
# Source: scripts/generate-component-axes.mjs
# Issue: brikdesigns/brik-bds#561 (ADR-009)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'components/ui/**/*.tsx'
      - 'manifest/component-axes.json'
      - 'scripts/generate-component-axes.mjs'
  push:
    branches:
      - main
    paths:
      - 'components/ui/**/*.tsx'
      - 'manifest/component-axes.json'
      - 'scripts/generate-component-axes.mjs'

concurrency:
  group: component-axes-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  component-axes-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check component axes manifest is in sync
        run: npm run typegen:axes:check
