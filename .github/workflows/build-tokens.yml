name: Build Design Tokens

on:
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  push:
    paths:
      - 'design-tokens/**'
      - 'sd.config.tokens-studio.mjs'
  workflow_dispatch:

jobs:
  build-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build all tokens (Style Dictionary from Figma)
      run: npm run build:all-tokens

    - name: Stage token outputs
      run: |
        git add design-tokens/ tokens/
        git add -f build/

    - name: Commit and push changes
      run: |
        if git diff --cached --quiet; then
          echo "No token changes to commit"
          exit 0
        fi
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git commit -m "Build design tokens — $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        git push
