name: Icon Collection Check

# Ensures components/icons.generated.json stays in sync with shipped `ph:*`
# usage. Fails the build if a `ph:*` icon is used in shipped source but missing
# from the committed subset (it would silently fall through to the Iconify CDN),
# or if a referenced icon doesn't exist in @iconify-json/ph at all (a typo).
#
# Why this is a CI gate (not just pre-push):
#   - Cloud-agent commits bypass local hooks entirely.
#   - PRs from fresh clones may not have husky installed.
#   - The offline-icon guarantee is only as good as the subset's coverage.
#
# Source: scripts/gen-icon-collection.mjs
# Issue: brikdesigns/brik-bds#1002

on:
  pull_request:
    branches:
      - main
    paths:
      - 'components/**/*.ts'
      - 'components/**/*.tsx'
      - 'content-system/**/*.ts'
      - 'content-system/**/*.tsx'
      - 'tokens/**/*.ts'
      - 'components/icons.generated.json'
      - 'scripts/gen-icon-collection.mjs'
  push:
    branches:
      - main
    paths:
      - 'components/**/*.ts'
      - 'components/**/*.tsx'
      - 'content-system/**/*.ts'
      - 'content-system/**/*.tsx'
      - 'tokens/**/*.ts'
      - 'components/icons.generated.json'
      - 'scripts/gen-icon-collection.mjs'

concurrency:
  group: icon-collection-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  icon-collection-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check offline icon collection is in sync
        run: npm run gen:icons:check
